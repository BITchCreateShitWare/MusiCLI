<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="note" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b1b9f9"/>
      <stop offset="100%" stop-color="#7e8af0"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- music note ♪ -->
  <text x="64" y="98" text-anchor="middle"
        font-family="serif" font-size="96" font-weight="bold"
        fill="url(#note)">♪</text>
  <!-- subtle glow ring -->
  <rect width="128" height="128" rx="24" fill="none"
        stroke="#b1b9f9" stroke-width="1.5" stroke-opacity="0.15"/>
</svg>
